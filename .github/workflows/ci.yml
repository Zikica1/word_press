name: CI

on:
  pull_request:
    branches: [dev, staging, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout/@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.17.0
          cache: 'npm'

      - name: Install
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
